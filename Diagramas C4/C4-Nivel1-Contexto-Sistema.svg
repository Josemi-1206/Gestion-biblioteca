<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1050" font-family="Segoe UI, Arial, sans-serif">
<defs>
    <style>
      .title-main   { font-size:28px; font-weight:700; fill:#1e293b; }
      .title-sub    { font-size:13px; fill:#64748b; }
      .diagram-title{ font-size:20px; font-weight:700; fill:#1e293b; }
      .diagram-sub  { font-size:11px; fill:#64748b; }
      .box-title    { font-size:13px; font-weight:700; }
      .box-tag      { font-size:10px; font-style:italic; }
      .box-desc     { font-size:10.5px; }
      .arrow-label  { font-size:10px; fill:#475569; }
      .section-bg   { fill:#f8fafc; rx:16; }
      .legend-text  { font-size:11px; fill:#475569; }
    </style>

    <!-- Arrowhead markers -->
    <marker id="arr-dark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>

    <!-- Drop shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000012"/>
    </filter>
  </defs>
<rect width="1600" height="1050" fill="#f1f5f9"/>
<rect x="0" y="0" width="1600" height="70" fill="#1e293b"/>
<text x="800" y="30" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="white">Nivel 1 — Diagrama de Contexto del Sistema</text>
<text x="800" y="52" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#94a3b8">[System Context] Visión general: actores y sistemas externos que interactúan con el sistema · C4 Model</text>
<text x="800" y="66" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#64748b">José Miguel Aya Peralta · Andrés Felipe Calle González · Programación Web CORHUILA 2026A</text>
  <!-- ║  NIVEL 1 — DIAGRAMA DE CONTEXTO DEL SISTEMA             ║ -->
  <!-- ╚══════════════════════════════════════════════════════════╝ -->

  <!-- Panel background -->
  <rect x="40" y="110" width="1520" height="860" rx="16" fill="white" filter="url(#shadow)"/>
  <rect x="40" y="110" width="1520" height="46" rx="16" fill="#1e293b"/>
  <rect x="40" y="140" width="1520" height="16" fill="#1e293b"/>
  <text x="800" y="138" text-anchor="middle" fill="white" font-size="16" font-weight="700">Nivel 1 — Diagrama de Contexto del Sistema</text>
  <text x="800" y="158" text-anchor="middle" fill="#94a3b8" font-size="10">[System Context] Visión general: actores y sistemas externos que interactúan con el sistema</text>

  <!-- System boundary -->
  <rect x="560" y="310" width="480" height="360" rx="12" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="10,5"/>
  <text x="800" y="300" text-anchor="middle" fill="#94a3b8" font-size="11" font-style="italic">Sistema de Biblioteca Digital</text>

  <!-- ── PEOPLE ── -->
  <!-- Bibliotecario -->
  <g transform="translate(155,330)">
    <circle cx="0" cy="0" r="36" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5" filter="url(#shadow-sm)"/>
    <text x="0" y="5" text-anchor="middle" font-size="26">👤</text>
    <rect x="-68" y="44" width="136" height="70" rx="8" fill="#3b82f6" filter="url(#shadow-sm)"/>
    <text x="0" y="62" text-anchor="middle" fill="white" font-size="12" font-weight="700">Bibliotecario</text>
    <text x="0" y="78" text-anchor="middle" fill="#bfdbfe" font-size="9" font-style="italic">[Persona]</text>
    <text x="0" y="95" text-anchor="middle" fill="#dbeafe" font-size="9.5">Administra catálogo,</text>
    <text x="0" y="108" text-anchor="middle" fill="#dbeafe" font-size="9.5">préstamos y multas</text>
  </g>

  <!-- Usuario Lector -->
  <g transform="translate(155,580)">
    <circle cx="0" cy="0" r="36" fill="#d1fae5" stroke="#10b981" stroke-width="2.5" filter="url(#shadow-sm)"/>
    <text x="0" y="5" text-anchor="middle" font-size="26">👨‍🎓</text>
    <rect x="-68" y="44" width="136" height="70" rx="8" fill="#10b981" filter="url(#shadow-sm)"/>
    <text x="0" y="62" text-anchor="middle" fill="white" font-size="12" font-weight="700">Usuario Lector</text>
    <text x="0" y="78" text-anchor="middle" fill="#a7f3d0" font-size="9" font-style="italic">[Persona]</text>
    <text x="0" y="95" text-anchor="middle" fill="#d1fae5" font-size="9.5">Realiza préstamos,</text>
    <text x="0" y="108" text-anchor="middle" fill="#d1fae5" font-size="9.5">reservas y consultas</text>
  </g>

  <!-- CORE SYSTEM -->
  <rect x="600" y="340" width="400" height="120" rx="10" fill="#1e40af" filter="url(#shadow)"/>
  <text x="800" y="375" text-anchor="middle" fill="white" font-size="15" font-weight="700">Sistema de Gestión</text>
  <text x="800" y="393" text-anchor="middle" fill="white" font-size="15" font-weight="700">de Biblioteca Digital</text>
  <text x="800" y="413" text-anchor="middle" fill="#bfdbfe" font-size="9.5" font-style="italic">[Software System]</text>
  <text x="800" y="430" text-anchor="middle" fill="#93c5fd" font-size="9.5">Gestiona catálogo, préstamos,</text>
  <text x="800" y="445" text-anchor="middle" fill="#93c5fd" font-size="9.5">multas y reservas de la biblioteca</text>

  <!-- EXTERNAL SYSTEMS -->
  <!-- PostgreSQL DB -->
  <g transform="translate(1290,370)">
    <rect x="-80" y="-40" width="160" height="100" rx="8" fill="#374151" filter="url(#shadow-sm)"/>
    <text x="0" y="-16" text-anchor="middle" fill="white" font-size="22">🗄️</text>
    <text x="0" y="8" text-anchor="middle" fill="white" font-size="12" font-weight="700">PostgreSQL</text>
    <text x="0" y="22" text-anchor="middle" fill="#9ca3af" font-size="9" font-style="italic">[External System]</text>
    <text x="0" y="38" text-anchor="middle" fill="#d1d5db" font-size="9">Motor de base de datos</text>
    <text x="0" y="50" text-anchor="middle" fill="#d1d5db" font-size="9">relacional</text>
  </g>

  <!-- Docker -->
  <g transform="translate(1290,560)">
    <rect x="-80" y="-40" width="160" height="100" rx="8" fill="#374151" filter="url(#shadow-sm)"/>
    <text x="0" y="-16" text-anchor="middle" fill="white" font-size="22">🐳</text>
    <text x="0" y="8" text-anchor="middle" fill="white" font-size="12" font-weight="700">Docker</text>
    <text x="0" y="22" text-anchor="middle" fill="#9ca3af" font-size="9" font-style="italic">[External System]</text>
    <text x="0" y="38" text-anchor="middle" fill="#d1d5db" font-size="9">Orquestación de</text>
    <text x="0" y="50" text-anchor="middle" fill="#d1d5db" font-size="9">contenedores</text>
  </g>

  <!-- Browser / Device -->
  <g transform="translate(800,750)">
    <rect x="-90" y="-40" width="180" height="100" rx="8" fill="#374151" filter="url(#shadow-sm)"/>
    <text x="0" y="-14" text-anchor="middle" fill="white" font-size="20">🌐</text>
    <text x="0" y="8" text-anchor="middle" fill="white" font-size="12" font-weight="700">Navegador Web</text>
    <text x="0" y="22" text-anchor="middle" fill="#9ca3af" font-size="9" font-style="italic">[External System]</text>
    <text x="0" y="38" text-anchor="middle" fill="#d1d5db" font-size="9">Interfaz de acceso</text>
    <text x="0" y="50" text-anchor="middle" fill="#d1d5db" font-size="9">del usuario final</text>
  </g>

  <!-- ARROWS — L1 -->
  <!-- Bibliotecario → Sistema -->
  <line x1="228" y1="370" x2="597" y2="385" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="320" y="350" width="165" height="28" rx="5" fill="white" opacity="0.9"/>
  <text x="403" y="362" text-anchor="middle" fill="#3b82f6" font-size="9.5" font-weight="600">Gestiona catálogo y préstamos</text>
  <text x="403" y="374" text-anchor="middle" fill="#64748b" font-size="9">[HTTPS / Navegador Web]</text>

  <!-- Lector → Sistema -->
  <line x1="228" y1="590" x2="597" y2="430" stroke="#10b981" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="290" y="484" width="165" height="28" rx="5" fill="white" opacity="0.9"/>
  <text x="373" y="496" text-anchor="middle" fill="#10b981" font-size="9.5" font-weight="600">Consulta y reserva libros</text>
  <text x="373" y="508" text-anchor="middle" fill="#64748b" font-size="9">[HTTPS / Navegador Web]</text>

  <!-- Sistema → PostgreSQL -->
  <line x1="1003" y1="385" x2="1207" y2="380" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-orange)"/>
  <rect x="1040" y="358" width="140" height="28" rx="5" fill="white" opacity="0.9"/>
  <text x="1110" y="370" text-anchor="middle" fill="#f59e0b" font-size="9.5" font-weight="600">Lee y escribe datos</text>
  <text x="1110" y="382" text-anchor="middle" fill="#64748b" font-size="9">[Prisma ORM / TCP]</text>

  <!-- Sistema → Docker -->
  <line x1="1003" y1="420" x2="1208" y2="540" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-orange)"/>
  <rect x="1054" y="464" width="140" height="28" rx="5" fill="white" opacity="0.9"/>
  <text x="1124" y="476" text-anchor="middle" fill="#f59e0b" font-size="9.5" font-weight="600">Desplegado como</text>
  <text x="1124" y="488" text-anchor="middle" fill="#64748b" font-size="9">contenedores [Docker]</text>

  <!-- Navegador → Sistema -->
  <line x1="800" y1="707" x2="800" y2="463" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr-purple)"/>
  <rect x="720" y="580" width="160" height="28" rx="5" fill="white" opacity="0.9"/>
  <text x="800" y="592" text-anchor="middle" fill="#8b5cf6" font-size="9.5" font-weight="600">Renderiza la interfaz</text>
  <text x="800" y="604" text-anchor="middle" fill="#64748b" font-size="9">[HTTP / REST API]</text>

  <!-- L1 Legend -->
  <rect x="60" y="880" width="500" height="72" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="80" y="900" fill="#475569" font-size="11" font-weight="700">Leyenda — Nivel 1</text>
  <rect x="80" y="908" width="20" height="12" rx="3" fill="#1e40af"/><text x="108" y="919" class="legend-text">Sistema principal</text>
  <rect x="210" y="908" width="20" height="12" rx="3" fill="#3b82f6"/><text x="238" y="919" class="legend-text">Persona / Actor</text>
  <rect x="340" y="908" width="20" height="12" rx="3" fill="#374151"/><text x="368" y="919" class="legend-text">Sistema externo</text>
  <line x1="80" y1="940" x2="110" y2="940" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/><text x="118" y="944" class="legend-text">Relación / Interacción</text>


  <!-- ╔══════════════════════════════════════════════════════════╗ -->
<rect x="0" y="1020" width="1600" height="30" fill="#0f172a"/><text x="800" y="1038" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#64748b">C4 Model · Sistema de Gestión de Biblioteca Digital · NestJS + Next.js + PostgreSQL</text>
</svg>