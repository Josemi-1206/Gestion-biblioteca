<text x="800" y="972" text-anchor="middle" font-size="10" fill="#94a3b8">[Container Diagram] Descomposición en contenedores ejecutables · C4 Model</text>
<text x="800" y="986" text-anchor="middle" font-size="9" fill="#64748b">José Miguel Aya Peralta · Andrés Felipe Calle González · Programación Web CORHUILA 2026A</text>
<!-- Content (original coordinates preserved) -->
